<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界灯塔集 — Lighthouses of the World</title>
  <meta name="description" content="探索世界各地 100+ 座历史与现代灯塔，感受它们在茫茫大海中守望的光芒。" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>

<!-- ══════════════ HERO ══════════════ -->
<section id="hero">
  <img id="hero-bg-img" src="/images/hero-bg.jpg" alt="" aria-hidden="true" />
  <div id="hero-overlay" aria-hidden="true"></div>
  <canvas id="hero-canvas"></canvas>
  <div class="hero-content">
    <h1 class="hero-title">世界灯塔集</h1>
    <p class="hero-subtitle">Lighthouses of the World</p>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">500</span>
        <span class="stat-label">座灯塔</span>
      </div>
      <div class="stat">
        <span class="stat-num">7</span>
        <span class="stat-label">大洲地区</span>
      </div>
      <div class="stat">
        <span class="stat-num">AI</span>
        <span class="stat-label">智能介绍</span>
      </div>
    </div>
  </div>
  <div class="hero-scroll" title="向下滚动">
    <div class="scroll-arrow"></div>
    <span>探索</span>
  </div>
</section>

<!-- ══════════════ CONTROLS ══════════════ -->
<div id="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        id="search"
        type="text"
        placeholder="搜索灯塔名称、国家、地点…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <select id="region-filter" class="filter-select" title="按地区筛选">
      <option value="">全部地区</option>
      <option value="Europe">欧洲</option>
      <option value="North America">北美洲</option>
      <option value="South America">南美洲</option>
      <option value="Asia">亚洲</option>
      <option value="Oceania">大洋洲</option>
      <option value="Africa">非洲</option>
      <option value="Middle East">中东</option>
    </select>

    <select id="status-filter" class="filter-select" title="按状态筛选">
      <option value="">全部状态</option>
      <option value="active">现役</option>
      <option value="automated">自动化</option>
      <option value="historic">历史遗址</option>
      <option value="inactive">停用</option>
    </select>

    <div class="view-btns">
      <button class="view-btn active" data-view="grid" title="网格视图">⊞</button>
      <button class="view-btn" data-view="list" title="列表视图">≡</button>
      <button class="view-btn" data-view="map" title="地图视图">🗺</button>
    </div>

    <span id="result-count">加载中…</span>
  </div>
</div>

<!-- ══════════════ MAIN ══════════════ -->
<main id="main">
  <!-- Region pills -->
  <div class="region-pills" id="region-pills"></div>

  <!-- Grid view -->
  <div id="grid-view"></div>

  <!-- List view -->
  <div id="list-view" style="display:none"></div>

  <!-- Map view -->
  <div id="map-view" style="display:none"></div>
</main>

<!-- ══════════════ MODAL ══════════════ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="灯塔详情">
  <div class="modal" id="modal"></div>
</div>

<!-- ══════════════ FOOTER ══════════════ -->
<footer>
  <p>
    🗼 世界灯塔集 &nbsp;·&nbsp;
    图像来源 <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a>
    &nbsp;·&nbsp;
    AI 介绍由 <a href="https://anthropic.com" target="_blank" rel="noopener">Claude</a> 生成
    &nbsp;·&nbsp;
    地图 <a href="https://leafletjs.com" target="_blank" rel="noopener">Leaflet</a> + CARTO
  </p>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>

<!-- App (ES modules) -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
